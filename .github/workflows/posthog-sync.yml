name: PostHog → opt_ins sync

# Manual-only trigger. Hits the deployed sync route on praxis-centcom.vercel.app
# from a GitHub-hosted runner (which has network access to Vercel — this Claude
# session does not, hence the workflow). The route writes daily fact rows into
# report_external_facts so the reporting engine can compute opt_ins KPIs from
# PostHog data.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   - CRON_SECRET    Same value you set as CRON_SECRET in Vercel env. Used to
#                    authenticate the request without a Clerk session.
#
# Inputs:
#   - slug      Client slug (optional). Empty = sync ALL clients.
#   - event     PostHog event name. Default: opt_in_submitted.
#   - property  PostHog property to filter on (matched against the slug).
#               Default: client_slug.
#   - kind      Logical KPI name written into report_external_facts.kind.
#               Default: opt_ins.
#   - lookback  Days of history to pull. Default: 90, max: 365.

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Client slug (leave blank to sync ALL clients)"
        required: false
        default: ""
      event:
        description: "PostHog event name"
        required: false
        default: "opt_in_submitted"
      property:
        description: "PostHog property to match the slug against"
        required: false
        default: "client_slug"
      kind:
        description: "report_external_facts.kind to write"
        required: false
        default: "opt_ins"
      lookback:
        description: "Days of history (max 365)"
        required: false
        default: "90"

# Daily auto-run alongside Vercel cron — redundant but free, and surfaces
# failures in the Actions log if the Vercel cron misfires.
  schedule:
    - cron: "0 7 * * *"

permissions:
  # Needed so gh CLI in the run can post a comment back to issue #13.
  issues: write
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/integrations/posthog/sync
        id: sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SLUG: ${{ github.event.inputs.slug }}
          EVENT: ${{ github.event.inputs.event || 'opt_in_submitted' }}
          PROPERTY: ${{ github.event.inputs.property || 'client_slug' }}
          KIND: ${{ github.event.inputs.kind || 'opt_ins' }}
          LOOKBACK: ${{ github.event.inputs.lookback || '90' }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET repo secret is not set."
            exit 1
          fi
          BASE="https://praxis-centcom.vercel.app/api/integrations/posthog/sync"
          QS="event=${EVENT}&property=${PROPERTY}&kind=${KIND}&lookback=${LOOKBACK}"
          if [ -n "${SLUG}" ]; then
            QS="slug=${SLUG}&${QS}"
            echo "Syncing single client: ${SLUG}"
          else
            echo "Syncing ALL clients"
          fi
          URL="${BASE}?${QS}"
          echo "POST ${URL}"
          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "${URL}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json")
          echo "HTTP ${HTTP_CODE}"
          echo "----- response -----"
          if command -v jq >/dev/null 2>&1; then
            jq . response.json || cat response.json
          else
            cat response.json
          fi
          echo "http_code=${HTTP_CODE}" >> "$GITHUB_OUTPUT"
          # Step summary (visible at the bottom of the run page)
          UPSERTED=0
          if command -v jq >/dev/null 2>&1; then
            UPSERTED=$(jq -r '.total_upserted // 0' response.json 2>/dev/null || echo 0)
            FAILED=$(jq -r '.failed // 0' response.json 2>/dev/null || echo 0)
            CLIENTS=$(jq -r '(.clients // []) | length' response.json 2>/dev/null || echo 0)
            {
              echo "## PostHog → opt_ins sync"
              echo ""
              echo "- HTTP: \`${HTTP_CODE}\`"
              echo "- Clients processed: \`${CLIENTS}\`"
              echo "- Daily facts upserted: \`${UPSERTED}\`"
              echo "- Failures: \`${FAILED}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "upserted=${UPSERTED}" >> "$GITHUB_OUTPUT"
          # Fail loudly if HTTP wasn't 2xx
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::error::Sync HTTP ${HTTP_CODE}"
            exit 1
          fi

      # When the sync upserts zero rows, the cause is almost always that
      # PostHog doesn't have events matching the configured event name +
      # property. Hit the diagnostic endpoint to dump the top events
      # actually in PostHog so we can fix the sync filter in one round
      # instead of guessing.
      - name: Inspect PostHog (only when sync upserted 0)
        id: inspect
        if: steps.sync.outputs.upserted == '0' && steps.sync.outputs.http_code == '200'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          URL="https://praxis-centcom.vercel.app/api/integrations/posthog/inspect?lookback=30&limit=20"
          echo "POST ${URL}"
          HTTP_CODE=$(curl -sS -o inspect.json -w "%{http_code}" \
            -X POST "${URL}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json")
          echo "HTTP ${HTTP_CODE}"
          echo "----- inspect response -----"
          if command -v jq >/dev/null 2>&1; then
            jq . inspect.json || cat inspect.json
          else
            cat inspect.json
          fi
          echo "http_code=${HTTP_CODE}" >> "$GITHUB_OUTPUT"

      - name: Post result to tracking issue #13
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HTTP_CODE: ${{ steps.sync.outputs.http_code }}
        run: |
          set -euo pipefail
          BODY_FILE=$(mktemp)
          {
            echo "### Run [${{ github.run_id }}/${{ github.run_attempt }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }})"
            echo ""
            echo "- Event: \`${{ github.event.inputs.event || 'opt_in_submitted' }}\` · Property: \`${{ github.event.inputs.property || 'client_slug' }}\` · Kind: \`${{ github.event.inputs.kind || 'opt_ins' }}\` · Lookback: \`${{ github.event.inputs.lookback || '90' }}d\` · Slug: \`${{ github.event.inputs.slug || '*all*' }}\`"
            echo "- HTTP: \`${HTTP_CODE:-?}\`"
            echo ""
            echo '#### Sync response'
            echo '```json'
            cat response.json 2>/dev/null || echo '{ "error": "no response.json — sync step likely failed before request" }'
            echo ''
            echo '```'
            if [ -f inspect.json ]; then
              echo ''
              echo '#### Diagnostics — top events PostHog has (last 30d)'
              echo 'Sync upserted 0 rows, so the workflow also hit `/api/integrations/posthog/inspect`. Use this list to retune the sync filter (Run workflow → set `event` / `property`).'
              echo ''
              echo '```json'
              cat inspect.json
              echo ''
              echo '```'
            fi
          } > "$BODY_FILE"
          gh issue comment 13 --repo "${{ github.repository }}" --body-file "$BODY_FILE"
